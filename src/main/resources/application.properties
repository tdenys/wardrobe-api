spring.application.name=api-dressing
weather.api.key=${WEATHER_API_KEY}

# H2 in-memory database
# http://localhost:8080/h2-console BDD:jdbc:h2:mem:dressing
spring.datasource.url=jdbc:h2:mem:dressing;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Cloudflare R2 - stockage des images de vetements
r2.endpoint=https://1457e4a1ab282ee146e647bd932f759e.r2.cloudflarestorage.com/clothing
r2.access-key-id=${R2_ACCESS_KEY_ID}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY}
r2.bucket-name=clothing
r2.public-base-url=https://pub-172a1148e7f74736985e878d736184da.r2.dev

# Logs
logging.level.com.example.apidressing.security=DEBUG
