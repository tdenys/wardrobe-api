spring.application.name=api-dressing
weather.api.key=${WEATHER_API_KEY}

# H2 in-memory database
# http://localhost:8080/h2-console BDD:jdbc:h2:mem:dressing
spring.datasource.url=jdbc:h2:mem:dressing;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Logs
logging.level.com.example.apidressing.security=DEBUG
