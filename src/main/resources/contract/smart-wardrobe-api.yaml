openapi: 3.0.3
info:
  title: Smart Wardrobe API
  description: API pour l'application de gestion de dressing et suggestions de tenues.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Serveur de développement local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- ENUMS ---
    ClothingLayer:
      type: string
      enum: [BASE, TOP, MID, OUTER, BOTTOM, SHOES, ACCESSORY]
      description: "Couche du vêtement (ex: TOP pour T-shirt, OUTER pour Manteau)"
    
    ItemStatus:
      type: string
      enum: [IN_WARDROBE, WISHLIST, SUGGESTION]

    # --- OBJETS METIERS ---
    ClothingItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "Pull en laine bleu"
        imageUrl:
          type: string
          format: uri
          description: "URL accessible de l'image stockée"
        layer:
          $ref: '#/components/schemas/ClothingLayer'
        warmthLevel:
          type: integer
          minimum: 1
          maximum: 5
          description: "1 = Léger (Lin), 5 = Très chaud (Doudoune)"
        isWaterproof:
          type: boolean
          description: "Le vêtement est-il imperméable ?"
        isWindproof:
          type: boolean
          description: "Le vêtement est-il coupe-vent ?"
        status:
          $ref: '#/components/schemas/ItemStatus'

    Outfit:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "Tenue Hiver Bureau"
        createdAt:
          type: string
          format: date-time
          description: "Date de création de la tenue"
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClothingItem'

    PagedOutfits:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Outfit'
        totalElements:
          type: integer
          format: int64
          description: "Nombre total de tenues"
        totalPages:
          type: integer
          description: "Nombre total de pages"
        page:
          type: integer
          description: "Page courante (commence à 0)"
        size:
          type: integer
          description: "Nombre d'éléments par page"

    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string

    CreateOutfitRequest:
      type: object
      required: [name, itemIds]
      properties:
        name:
          type: string
          example: "Tenue Hiver Bureau"
        itemIds:
          type: array
          items:
            type: integer
            format: int64
          description: "Liste des ID des vêtements qui composent la tenue"

    WeatherSuggestion:
      type: object
      properties:
        city:
          type: string
          example: "Paris"
        temperature:
          type: number
          format: float
          example: 12.5
        description:
          type: string
          example: "Pluvieux"
        suggestedOutfit:
          $ref: '#/components/schemas/Outfit'
        reasoning:
          type: string
          example: "Il pleut, j'ai choisi votre trench imperméable."

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Inscription et connexion
  - name: Wardrobe
    description: Gestion des vêtements
  - name: Outfits
    description: Gestion des tenues composées
  - name: Suggestions
    description: Algorithmes intelligents

paths:
  # --- AUTHENTIFICATION ---
  /auth/register:
    post:
      tags: [Auth]
      summary: Créer un compte
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email déjà utilisé

  /auth/login:
    post:
      tags: [Auth]
      summary: Se connecter
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Identifiants invalides

  # --- GESTION DU DRESSING ---
  /clothing-items:
    get:
      tags:
        - Wardrobe
      summary: Lister les vêtements du dressing
      operationId: listClothingItems
      parameters:
        - name: layer
          in: query
          schema:
            $ref: '#/components/schemas/ClothingLayer'
          required: false
          description: Filtrer par type (lister seulement les chaussures, ect...)
      responses:
        '200':
          description: Liste récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClothingItem'

    post:
      tags:
        - Wardrobe
      summary: Ajouter un vêtement (avec upload photo)
      operationId: addClothingItem
      description: "Upload multipart: Image + Données"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: "Le fichier image (jpg/png)"
                name:
                  type: string
                layer:
                  $ref: '#/components/schemas/ClothingLayer'
                warmthLevel:
                  type: integer
                  minimum: 1
                  maximum: 5
                mainColorHex:
                  type: string
                  example: "#FF0000"
                isWaterproof:
                  type: boolean
                isWindproof:
                  type: boolean
              required:
                - name
                - layer
                - warmthLevel
                - isWaterproof
                - isWindproof
      responses:
        '201':
          description: Vêtement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClothingItem'

  /clothing-items/{id}:
    delete:
      tags:
        - Wardrobe
      summary: Supprimer un vêtement
      operationId: deleteClothingItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Supprimé avec succès

  # --- GESTION DES TENUES ---
  /outfits:
    get:
      tags:
        - Outfits
      summary: Lister mes tenues enregistrées (paginé, trié par date de création desc)
      operationId: listOutfits
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: "Numéro de page (commence à 0)"
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: "Nombre d'éléments par page"
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedOutfits'
    
    post:
      tags:
        - Outfits
      summary: Créer une nouvelle tenue manuellement
      operationId: createOutfit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOutfitRequest'
      responses:
        '201':
          description: Tenue créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Outfit'

  # --- SUGGESTIONS ---
  /suggestions/daily/by-gps:
    get:
      tags:
        - Wardrobe
      summary: Obtenir une suggestion basée sur la météo par GPS
      operationId: getDailySuggestionByGps
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: float
          description: Latitude (GPS)
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: float
          description: Longitude (GPS)
      responses:
        '200':
          description: Suggestion générée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherSuggestion'

  /suggestions/daily/by-city:
    get:
      tags:
        - Wardrobe
      summary: Obtenir une suggestion basée sur la météo par nom de ville
      operationId: getDailySuggestionByCity
      parameters:
        - name: city
          in: query
          required: true
          schema:
            type: string
          description: Nom de la ville
      responses:
        '200':
          description: Suggestion générée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherSuggestion'